{{- if and .Values.enabled .Values.dashboardProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hermes.fullname" . }}-nginx
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }
    server {
      listen {{ .Values.ports.dashboardProxy }};
      server_name _;

      # Large agent responses / uploads.
      client_max_body_size {{ .Values.dashboardProxy.clientMaxBodySize }};

      location / {
        # Auth is enforced by the dashboard's own basic_auth (config.yaml) —
        # a public bind requires it, and only it can mint the WS tickets the
        # browser chat needs. nginx here is a WS-capable reverse proxy, not the
        # auth gate (external Basic Auth cannot authenticate the WebSocket).
        proxy_pass http://127.0.0.1:{{ .Values.ports.dashboard }};
        # Dashboard binds 0.0.0.0 --insecure (accepts any Host/Origin), so we
        # forward the real public Host — needed for its WebSocket Host/Origin
        # guard to pass and for correct URL generation.
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (dashboard PTY/chat) + SSE (streaming) support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout {{ .Values.dashboardProxy.proxyReadTimeout }};
        proxy_send_timeout {{ .Values.dashboardProxy.proxyReadTimeout }};
      }
    }
{{- end }}
