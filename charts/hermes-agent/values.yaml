# Default values for the hermes chart.
#
# See openspec/changes/011-hermes-agent.md (architecture/decisions) and
# openspec/changes/012-hermes-image-and-chart.md (this WP's task list) for
# the full rationale. This chart is authored + static-validated only (WP012
# task 4) — it is NOT live-deployed against a real LLM from this WP. The
# ArgoCD Application (clusters/dev/apps/hermes.yaml) overrides `enabled:
# false` as a safe non-serving default until the WP011 LLM provider/budget
# decision lands; flip it to `true` (and fill in the image digest + create
# the Secrets in README.md) to go live.

# Master switch: when false, every template in this chart renders NO
# resources at all. Used by clusters/dev/apps/hermes.yaml so ArgoCD sync is
# a safe no-op even if the root app-of-apps picks this Application up.
enabled: true

nameOverride: ""
fullnameOverride: ""

# Hermes is SQLite/JSON, single-writer per-profile-locked state — this MUST
# stay 1. Enforced at template time (templates/statefulset.yaml fails the
# render if it's ever anything else) so a stray override can't silently
# scale out and corrupt data.
replicaCount: 1

image:
  # Built from the ./hermes-agent submodule (NousResearch/hermes-agent, MIT)
  # by .github/workflows/hermes-image.yml → ghcr.io/welikecode/hermes-agent.
  repository: ghcr.io/welikecode/hermes-agent
  tag: "v2026.7.1"
  # Immutable digest of the v2026.7.1 build (ghcr.io/welikecode/hermes-agent),
  # published by .github/workflows/hermes-image.yml on 2026-07-05.
  digest: "sha256:d1fce9854fcad47d89a930918ebfaffa3ea4e5166ffd537e27bf52fb4bdbf077"
  pullPolicy: IfNotPresent

hermes:
  # UID/GID the initContainer chowns /opt/data to before the app containers
  # start. The upstream image starts as root and remaps to this UID
  # internally (its own stage2-hook) — see openspec 011 "Kubernetes
  # gotchas". Do NOT set runAsNonRoot/runAsUser on the gateway/dashboard
  # containers: the image's entrypoint needs to start as root and drop
  # privileges itself; forcing non-root here would break that handoff
  # before the chown has even happened on first boot.
  uid: 10000
  gid: 10000
  dataDir: /opt/data

# Small, pinned-by-digest image used only to chown the PVC (initContainer)
# and to tar it for backups (CronJob) — never runs Hermes itself.
initContainer:
  image:
    repository: busybox
    tag: "1.36.1"
    # Resolved 2026-07-05 via the Docker Hub tags API (amd64), same
    # pin-by-digest convention as charts/demo.
    digest: sha256:b7f3d86d6e84fc17718c48bcde1450807faa2d56704205c697b4bd5df7b9e29f

# ---------------------------------------------------------------------
# LLM provider — self-hosted Ollama reached over Tailscale (decided
# 2026-07-05). Hermes talks to Ollama via its OpenAI-compatible endpoint
# (/v1), so OPENAI_BASE_URL points at the Ollama host's tailnet address.
# Cost: €0 (self-hosted). REQUIREMENTS to be aware of:
#   * Hermes needs >=64k context — set Ollama num_ctx accordingly and pick
#     a model that supports it (Gemma 3 12B = 128k ok; verify Qwen variant).
#   * Reachability VERIFIED 2026-07-05: a pod on this cluster reaches the
#     Ollama host at 100.126.196.47:11434 directly (the k3s nodes route pod
#     egress to the tailnet) — NO Tailscale sidecar/operator needed.
# ---------------------------------------------------------------------
llm:
  # Provider id for the seed-config init. "ollama" = local/self-hosted Ollama
  # (OpenAI-compatible); NOT "openai".
  provider: "ollama"
  # API key for the provider. Ollama ignores the value but Hermes requires one
  # ("No API key configured for provider 'custom'" otherwise). Any non-empty
  # string works for Ollama; use a real key for a paid provider.
  apiKey: "ollama"
  # Ollama OpenAI-compatible base URL — the tailnet address of the Ollama
  # host. Replace OLLAMA-TS-HOST with the real Tailscale IP/MagicDNS name.
  openaiBaseUrl: "http://100.126.196.47:11434/v1"
  # Chosen model tag on the Ollama host. User options (pick one available):
  #   gemma4:12b-mlx        (Gemma 12B MLX — recommended, present on host)
  #   gemma4:12b-it-qat     (Gemma 12B QAT quant — also present)
  #   qwen3.5:4b-mlx-bf16   (enhanced Qwen 4B) / qwen3.5:2b-mlx-bf16 (2B)
  # Model tags VERIFIED present on the Ollama host 2026-07-05 (GET /api/tags).
  model: "gemma4:12b-mlx"
  # Extra plain (non-secret) env vars passed to the gateway, e.g. to point
  # other Hermes provider knobs at the Ollama endpoint. The OpenAI-compatible
  # API key (any non-empty value for Ollama) comes from the llm Secret, not here.
  extraEnv: {}

ports:
  dashboard: 9119        # dashboard binds this on 127.0.0.1 (behind nginx)
  dashboardProxy: 8080   # nginx Basic-Auth front — the Service targets this
  api: 8642

service:
  # ClusterIP only — no hostNetwork, no NodePort. The upstream compose's
  # `network_mode: host` is replaced by explicit containerPorts + this
  # Service. Public/team exposure (Cloudflare Tunnel + Access) layers on top.
  type: ClusterIP

# ---------------------------------------------------------------------
# Dashboard auth = nginx reverse proxy with HTTP Basic Auth in front of the
# dashboard (user decision 2026-07-05). The dashboard binds 127.0.0.1 (its
# own auth is off on loopback) and nginx is the sole gate; Cloudflare Access
# is the intended OUTER layer once Zero Trust is enabled.
# ---------------------------------------------------------------------
dashboardProxy:
  enabled: true
  # Public URL the dashboard is reached at (tunnel/Ingress hostname). REQUIRED
  # when fronted by a proxy/tunnel — the dashboard rejects requests whose Host
  # doesn't match its bind unless told its public URL. Empty = loopback/tailnet only.
  publicUrl: ""
  image:
    repository: nginx
    tag: "1.27-alpine"
    # Pin by digest in production (leave empty to use the tag).
    digest: ""
  realm: "Hermes Dashboard"
  clientMaxBodySize: "100m"
  proxyReadTimeout: "3600s"   # long-lived WS/SSE streams (PTY/chat)
  # Secret providing the htpasswd file (create out-of-band from Mintkey):
  #   htpasswd -nbB <user> <pass> > htpasswd
  #   kubectl -n hermes create secret generic hermes-dashboard-auth \
  #     --from-file=htpasswd=./htpasswd
  # (nginx no longer does auth — see dashboardAuth below.)

# Dashboard built-in auth (gated mode). The seed-config init sets
# dashboard.basic_auth in config.yaml from these values + a Secret so a fresh
# deploy is reproducible. The Secret (dashboardAuth.secretName) must contain:
#   password        — plaintext (init hashes it with scrypt)
#   session-secret  — random hex (so sessions survive restarts)
# Create it from Mintkey; see docs/OPERATIONS.md. optional:true means the pod
# still starts if absent (dashboard would then have no password until seeded).
dashboardAuth:
  enabled: true
  username: admin
  secretName: hermes-dashboard-auth

persistence:
  # Longhorn, not local-path: WP012's whole point is that Hermes' /opt/data
  # must survive a node loss (local-path PVs are node-pinned, see openspec
  # 011 "Durability caveat"). 2 replicas (the Longhorn Application's
  # defaultReplicaCount, clusters/dev/apps/longhorn.yaml) means a single
  # node loss keeps a healthy replica, zero data loss, single-writer
  # preserved.
  storageClass: longhorn
  size: 20Gi
  accessMode: ReadWriteOnce

resources:
  gateway:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  dashboard:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initChown:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  backup:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  dashboardProxy:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 200m
      memory: 64Mi

# Pins Hermes (and, when backup.enabled, the backup CronJob below) to a
# predictable node. Documented rather than automatic because: (1) a
# Longhorn RWO volume can only be *attached* to one node at a time —
# co-locating the backup Job with the StatefulSet's pod (same nodeSelector)
# lets both mount the primary data PVC without a multi-attach error, since
# multiple pods on the SAME node CAN mount one RWO volume; (2) predictable
# placement makes it obvious which node's disk backs Hermes' memory/skills/
# sessions. Example: {"kubernetes.io/hostname": "k8s-dev1"}
nodeSelector: {}

# Raw passthrough for a fuller affinity spec (e.g. nodeAffinity) instead of,
# or in addition to, nodeSelector above. Left empty by default.
affinity: {}

tolerations: []

podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

backup:
  # Secondary, defense-in-depth backup: tars /opt/data into a SEPARATE
  # Longhorn PVC (off the primary volume's replicas), protecting against
  # logical corruption, not just node loss (Longhorn replication already
  # covers node loss). Off-cluster S3 backup is explicitly OUT of scope
  # here (deferred to WP008 until Object Storage is purchased) — never
  # wire this to S3.
  enabled: true
  schedule: "0 3 * * *"
  # Number of dated hermes-data-*.tar.gz archives to retain in the backup
  # PVC; the CronJob prunes older ones after each successful run.
  keepLast: 7
  persistence:
    storageClass: longhorn
    size: 20Gi
    accessMode: ReadWriteOnce

# ---------------------------------------------------------------------
# Secrets — this chart NEVER embeds credentials, anywhere. Every value
# below is a *reference* (a Secret name), not a literal. The Secrets
# themselves must already exist in the `hermes` namespace before the pod
# can start correctly; create them out-of-band, sourced from Mintkey,
# exactly like `cloudflared-token` in clusters/dev/cloudflared/deployment.yaml
# — see README.md in this chart directory for the full list of required
# Secrets and the exact env vars each one must define.
#
# Each secret is wired in via `envFrom.secretRef` (whole-Secret injection)
# rather than per-key secretKeyRefs, so this chart never has to guess/
# hardcode individual key names that depend on WP011's still-open decisions
# (LLM provider, team channel, SSH host allowlist).
# ---------------------------------------------------------------------
secrets:
  llm:
    enabled: true
    # PLACEHOLDER name. Must define the chosen provider's API key env var
    # (e.g. ANTHROPIC_API_KEY or OPENROUTER_API_KEY — WP011 open question 1).
    secretName: hermes-llm-secret
  # NOTE: dashboard auth is handled by the nginx dashboardProxy (Basic Auth,
  # htpasswd Secret above) — NOT by Hermes' own auth env vars. The dashboard
  # binds loopback, so its built-in auth is disabled by design.
  mcpMintkey:
    enabled: true
    # Must define MCP_MINTKEY_AUTHORIZATION — the full "Bearer mk_agent_..."
    # header value used in Hermes' config.yaml mcp_servers[].headers.Authorization
    # entry pointed at the Mintkey MCP endpoint.
    secretName: hermes-mcp-mintkey-secret
  sshTerminal:
    enabled: true
    # Must define TERMINAL_SSH_* (host/user/key/port, per host as needed).
    # Exact host scope (NUC fleet + which k8s nodes) is WP011 open question 5.
    secretName: hermes-ssh-terminal-secret

# Networked MCP servers registered into Hermes' config.yaml `mcp_servers`
# (dict keyed by name). Seeded by the seed-config init container. Each entry:
# {enabled, url, transport}. transport defaults to sse.
mcpServers:
  mintmory:
    enabled: false
    url: ""
    transport: sse
