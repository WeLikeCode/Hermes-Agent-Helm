{{- if .Values.enabled }}
{{- if ne (int .Values.replicaCount) 1 }}
{{- fail "hermes: replicaCount must stay 1 — Hermes is single-writer SQLite/JSON state (see openspec/changes/011-hermes-agent.md, 'Storage: local-only, no external DB'); scaling out will corrupt data." }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hermes.fullname" . }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hermes.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  # Ordered, never-parallel pod management — matches the single-writer
  # requirement (also the StatefulSet default; spelled out for clarity).
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "hermes.serviceAccountName" . }}
      # Explicit containerPorts (below) + a normal ClusterIP Service
      # replace the upstream compose's `network_mode: host` — hostNetwork
      # is deliberately never set here.
      securityContext:
        fsGroup: {{ .Values.hermes.gid }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: chown-data
          image: {{ include "hermes.initImage" . }}
          # The upstream image starts as root and remaps to HERMES_UID/GID
          # internally on boot — pre-chown the volume to that UID/GID here
          # so the remap has somewhere it already owns. Runs as root
          # deliberately (chown itself needs it); do NOT add
          # runAsNonRoot/runAsUser to this container.
          command:
            - sh
            - -c
            - chown -R {{ .Values.hermes.uid }}:{{ .Values.hermes.gid }} {{ .Values.hermes.dataDir }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermes.dataDir }}
          resources:
            {{- toYaml .Values.resources.initChown | nindent 12 }}
        - name: seed-config
          image: {{ include "hermes.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Seed reproducible config into /opt/data/config.yaml so a FRESH
          # deploy (new PVC) comes up fully configured: LLM provider/model from
          # values; dashboard basic_auth username from values + password_hash
          # (hashed from the auth Secret) + session secret. Idempotent — safe to
          # re-run every start. Runs as the hermes uid (post-chown) so config
          # files are owned correctly.
          securityContext:
            runAsUser: {{ .Values.hermes.uid }}
            runAsGroup: {{ .Values.hermes.gid }}
            runAsNonRoot: true
          env:
            - name: HERMES_HOME
              value: {{ .Values.hermes.dataDir | quote }}
          command:
            - sh
            - -c
            - |
              set -e
              cd /opt/hermes
              hermes config set model.provider {{ .Values.llm.provider | quote }}
              hermes config set model.base_url {{ .Values.llm.openaiBaseUrl | quote }}
              hermes config set model.default {{ .Values.llm.model | quote }}
              hermes config set model.api_key {{ .Values.llm.apiKey | quote }}
              {{- range $name, $srv := .Values.mcpServers }}
              {{- if $srv.enabled }}
              # Networked MCP server. config.yaml mcp_servers is a dict keyed by
              # name; Hermes connects on agent tool-use. Omit `transport` for
              # streamable-HTTP (Mintkey /mcp); set `transport: sse` for SSE
              # (MintMory). Header values may use ${ENV_VAR} — Hermes
              # interpolates them at runtime (single-quoted here so the seed
              # shell writes the literal, not an empty expansion).
              {{- if $srv.transport }}
              hermes config set mcp_servers.{{ $name }}.transport {{ $srv.transport | quote }}
              {{- end }}
              hermes config set mcp_servers.{{ $name }}.url {{ $srv.url | quote }}
              {{- range $hk, $hv := ($srv.headers | default dict) }}
              hermes config set mcp_servers.{{ $name }}.headers.{{ $hk }} '{{ $hv }}'
              {{- end }}
              {{- end }}
              {{- end }}
              {{- if .Values.dashboardAuth.enabled }}
              hermes config set dashboard.basic_auth.username {{ .Values.dashboardAuth.username | quote }}
              if [ -s /seed/password ]; then
                H=$(python3 -c "from plugins.dashboard_auth.basic import hash_password; print(hash_password(open('/seed/password').read().strip()))")
                hermes config set dashboard.basic_auth.password_hash "$H"
              fi
              if [ -s /seed/session-secret ]; then
                hermes config set dashboard.basic_auth.secret "$(cat /seed/session-secret)"
              fi
              {{- end }}
              echo "seed-config: done"
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermes.dataDir }}
            {{- if .Values.dashboardAuth.enabled }}
            - name: dashboard-auth
              mountPath: /seed
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources.initChown | nindent 12 }}
      containers:
        - name: gateway
          image: {{ include "hermes.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Agent core, cron scheduler, messaging adapters, OpenAI-compat API.
          # NOTE: `args`, NOT `command` — the image ENTRYPOINT is s6-overlay's
          # `/init` (+ main-wrapper.sh); overriding it with `command` bypasses
          # the supervision tree and fails with "exec gateway: not found".
          # Upstream compose relies on this being CMD args to /init.
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: {{ .Values.ports.api }}
              protocol: TCP
          env:
            - name: HERMES_UID
              value: {{ .Values.hermes.uid | quote }}
            - name: HERMES_GID
              value: {{ .Values.hermes.gid | quote }}
            {{- if .Values.llm.openaiBaseUrl }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.llm.openaiBaseUrl | quote }}
            {{- end }}
            {{- range $k, $v := .Values.llm.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            {{- if .Values.secrets.llm.enabled }}
            - secretRef:
                name: {{ .Values.secrets.llm.secretName }}
            {{- end }}
            {{- if .Values.secrets.mcpMintkey.enabled }}
            - secretRef:
                name: {{ .Values.secrets.mcpMintkey.secretName }}
            {{- end }}
            {{- if .Values.secrets.sshTerminal.enabled }}
            - secretRef:
                name: {{ .Values.secrets.sshTerminal.secretName }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermes.dataDir }}
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
        - name: dashboard
          image: {{ include "hermes.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # React SPA + FastAPI admin UI. When dashboardProxy is enabled it
          # binds LOOPBACK only (127.0.0.1) — the nginx dashboard-proxy in
          # front is the sole reachable entrypoint and provides Basic Auth
          # (Hermes' own auth is off on a loopback bind, so nginx IS the gate).
          # `args` not `command` — preserve the image's /init entrypoint (see gateway).
          {{- if .Values.dashboardProxy.enabled }}
          # Bind all-interfaces so the dashboard accepts the public Host/Origin
          # (its guard only accepts loopback when bound to 127.0.0.1 → WS chat
          # fails 4403 behind a proxy). A public bind REQUIRES the dashboard's
          # own auth provider (this Hermes has no unauthenticated public bind;
          # --insecure is a deprecated no-op) — configure dashboard.basic_auth
          # in config.yaml. That built-in auth also mints the WS tickets the
          # browser needs, which external nginx Basic Auth cannot.
          args: ["dashboard", "--host", "0.0.0.0", "--no-open"]
          {{- else }}
          args: ["dashboard", "--host", "127.0.0.1", "--no-open"]
          {{- end }}
          {{- if not .Values.dashboardProxy.enabled }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.ports.dashboard }}
              protocol: TCP
          {{- end }}
          env:
            - name: HERMES_UID
              value: {{ .Values.hermes.uid | quote }}
            - name: HERMES_GID
              value: {{ .Values.hermes.gid | quote }}
            {{- if .Values.dashboardProxy.publicUrl }}
            # The dashboard validates the Host header against its bound host;
            # behind a proxy/tunnel it must be told its real public URL or it
            # returns 400 "Invalid Host header".
            - name: HERMES_DASHBOARD_PUBLIC_URL
              value: {{ .Values.dashboardProxy.publicUrl | quote }}
            {{- end }}
          envFrom:
            {{- if .Values.secrets.llm.enabled }}
            - secretRef:
                name: {{ .Values.secrets.llm.secretName }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermes.dataDir }}
          resources:
            {{- toYaml .Values.resources.dashboard | nindent 12 }}
        {{- if .Values.dashboardProxy.enabled }}
        - name: dashboard-proxy
          image: {{ include "hermes.dashboardProxyImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # nginx: plain WS-capable reverse proxy for the dashboard. Auth is
          # enforced by the dashboard's own basic_auth (gated bind), not here —
          # external Basic Auth cannot authenticate the browser WebSocket.
          ports:
            - name: http
              containerPort: {{ .Values.ports.dashboardProxy }}
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            {{- toYaml .Values.resources.dashboardProxy | nindent 12 }}
        {{- end }}
      {{- if or .Values.dashboardProxy.enabled .Values.dashboardAuth.enabled }}
      volumes:
        {{- if .Values.dashboardProxy.enabled }}
        - name: nginx-conf
          configMap:
            name: {{ include "hermes.fullname" . }}-nginx
        {{- end }}
        {{- if .Values.dashboardAuth.enabled }}
        - name: dashboard-auth
          secret:
            secretName: {{ .Values.dashboardAuth.secretName }}
            optional: true
        {{- end }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "hermes.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
