apiVersion: v2
name: hermes-agent
description: >-
  Hermes Agent (Nous Research, MIT) — single-writer SQLite/JSON agent state in
  /opt/data. StatefulSet (replicas: 1) with gateway + dashboard containers
  sharing one Longhorn-backed PVC (2 replicas, survives a node loss), a backup
  CronJob (defense-in-depth, separate Longhorn PVC), and all deploy-time secrets
  wired as k8s Secret references — never embedded. LLM via self-hosted Ollama
  over Tailscale. Upstream is the ./hermes-agent git submodule; the image is
  built to ghcr.io/welikecode/hermes-agent by .github/workflows/hermes-image.yml.
type: application
version: 0.1.0
# Upstream Hermes Agent release pinned by the ./hermes-agent submodule.
appVersion: "v2026.7.1"
